  <text x="116" y="126" font-family="monospace" font-size="28" font-weight="bold" fill="white" text-anchor="middle">csv</text>
  <!-- Brand -->
  <text x="80" y="228" font-family="monospace" font-size="36" font-weight="500" fill="#1a1916">csvbank.com</text>
  <!-- Headline -->
  <text x="80" y="320" font-family="Georgia, serif" font-size="72" fill="#1a1916" font-style="italic">Free PDF to CSV</text>
  <text x="80" y="400" font-family="Georgia, serif" font-size="72" fill="#1a7f4e" font-style="italic">Bank Statement Converter</text>
