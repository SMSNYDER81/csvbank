  <!-- Pills -->
  <rect x="80" y="510" width="180" height="40" rx="20" fill="#e8f5ee" stroke="#1a7f4e" stroke-width="1.5"/>
  <text x="170" y="535" font-family="monospace" font-size="16" fill="#1a7f4e" text-anchor="middle">Free Forever</text>
  <rect x="278" y="510" width="160" height="40" rx="20" fill="#e8f0f8" stroke="#1a5f8f" stroke-width="1.5"/>
  <text x="358" y="535" font-family="monospace" font-size="16" fill="#1a5f8f" text-anchor="middle">No Sign-Up</text>
  <rect x="456" y="510" width="160" height="40" rx="20" fill="#e8f5ee" stroke="#1a7f4e" stroke-width="1.5"/>
  <text x="536" y="535" font-family="monospace" font-size="16" fill="#1a7f4e" text-anchor="middle">100% Private</text>
